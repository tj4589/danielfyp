<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CX Intelligence | Login</title>
    <!-- Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body
    class="auth-wrapper min-vh-100 d-flex align-items-center justify-content-center"
  >
    <div class="container">
      <!-- File Protocol Warning -->
      <div
        id="file-protocol-warning"
        class="alert alert-danger d-none mt-4 border-2 border-danger shadow text-center"
        role="alert"
      >
        <h4 class="alert-heading fw-bold">
          <i class="ph-fill ph-warning-octagon"></i> Setup Required
        </h4>
        <p>
          It looks like you opened this file directly in your browser. The
          backend will not work this way!
        </p>
        <hr />
        <p class="mb-0 fw-medium">
          Please open your terminal, run <code>node server.js</code>, and visit
          <a href="http://localhost:3000" class="alert-link"
            >http://localhost:3000</a
          >
        </p>
      </div>

      <script>
        if (window.location.protocol === "file:") {
          document
            .getElementById("file-protocol-warning")
            .classList.remove("d-none");
        }
      </script>

      <div class="row justify-content-center mt-4">
        <div class="col-md-6 col-lg-5 col-xl-4">
          <div class="card auth-card border-0 rounded-4 p-4 p-md-5">
            <div class="text-center mb-5">
              <div
                class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3"
                style="width: 56px; height: 56px"
              >
                <i class="ph ph-chart-polar fs-2"></i>
              </div>
              <h1 class="h4 fw-bold mb-1">CX Intelligence System</h1>
              <p class="text-muted small">Sign in to access your dashboard</p>
            </div>

            <form id="login-form">
              <div
                id="login-error"
                class="alert alert-danger d-none small py-2"
                role="alert"
              >
                Invalid credentials.
              </div>

              <div class="mb-3">
                <label class="form-label small fw-medium text-muted"
                  >Username</label
                >
                <div class="position-relative">
                  <i
                    class="ph ph-user position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"
                  ></i>
                  <input
                    type="text"
                    id="username"
                    class="form-control bg-body-tertiary ps-5 py-2 border-0 rounded-3"
                    placeholder="admin or user"
                    required
                  />
                </div>
              </div>

              <div class="mb-4">
                <label
                  class="form-label small fw-medium text-muted d-flex justify-content-between"
                >
                  Password
                  <a href="#" class="text-primary text-decoration-none"
                    >Forgot?</a
                  >
                </label>
                <div class="position-relative">
                  <i
                    class="ph ph-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"
                  ></i>
                  <input
                    type="password"
                    id="password"
                    class="form-control bg-body-tertiary ps-5 py-2 border-0 rounded-3"
                    placeholder="admin123 or user123"
                    required
                  />
                </div>
              </div>

              <button
                type="submit"
                id="login-btn"
                class="btn btn-primary w-100 py-2 rounded-3 fw-semibold mb-4 d-flex align-items-center justify-content-center gap-2"
              >
                <span>Sign In</span>
                <i class="ph ph-arrow-right"></i>
              </button>
            </form>

            <!-- <div class="text-center">
                        <p class="small text-muted mb-0">Demo Accounts:</p>
                        <p class="small text-muted mb-0">Admin: <code>admin</code> / <code>admin123</code></p>
                        <p class="small text-muted mb-0">User: <code>user</code> / <code>user123</code></p>
                    </div> -->
          </div>
        </div>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
